<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .block1 { fill: #FF6B6B; }
      .block2 { fill: #4ECDC4; }
      .block3 { fill: #FFD166; }
      .block4 { fill: #6A0572; }
      .block5 { fill: #1A936F; }
      .block6 { fill: #114B8C; }
      .toothless { fill: #FF9A8B; }
      .toothless-features { fill: #333; }
      .text { fill: #333; }
      .eye { fill: #FFFFFF; }
      .pupil { fill: #333; }
      .tongue { fill: #FF6B6B; }
      .sparkle1 { fill: #FFFFFF; opacity: 0.8; }
      .sparkle2 { fill: #FFFF00; opacity: 0.9; }
      .sparkle3 { fill: #00FFFF; opacity: 0.8; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feFlood flood-color="rgba(0,0,0,0.3)"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fun background elements -->
  <circle cx="30" cy="30" r="5" class="sparkle1"/>
  <circle cx="170" cy="20" r="4" class="sparkle2"/>
  <circle cx="180" cy="180" r="6" class="sparkle3"/>
  <circle cx="20" cy="170" r="3" class="sparkle1"/>
  <circle cx="100" cy="10" r="4" class="sparkle2"/>

  <!-- Dragon shape formed by syllable blocks -->
  <!-- Dragon head (top blocks) -->
  <rect x="120" y="30" width="30" height="30" rx="8" class="block1" filter="url(#shadow)"/>
  <rect x="90" y="30" width="30" height="30" rx="8" class="block2" filter="url(#shadow)"/>
  <rect x="60" y="30" width="30" height="30" rx="8" class="block3" filter="url(#shadow)"/>

  <!-- Dragon ears with fun details -->
  <polygon points="125,25 135,5 145,25" class="toothless" filter="url(#shadow)"/>
  <polygon points="115,25 105,5 95,25" class="toothless" filter="url(#shadow)"/>
  <circle cx="135" cy="12" r="2" class="sparkle1"/>
  <circle cx="105" cy="12" r="2" class="sparkle1"/>

  <!-- Dragon eyes with whites and pupils -->
  <circle cx="125" cy="40" r="6" class="eye"/>
  <circle cx="105" cy="40" r="6" class="eye"/>
  <circle cx="125" cy="40" r="3" class="pupil"/>
  <circle cx="105" cy="40" r="3" class="pupil"/>
  <circle cx="123" cy="38" r="1" class="sparkle1"/>
  <circle cx="103" cy="38" r="1" class="sparkle1"/>

  <!-- Dragon neck and body -->
  <rect x="75" y="60" width="30" height="30" rx="8" class="block4" filter="url(#shadow)"/>
  <rect x="60" y="90" width="30" height="30" rx="8" class="block5" filter="url(#shadow)"/>
  <rect x="90" y="90" width="30" height="30" rx="8" class="block6" filter="url(#shadow)"/>
  <rect x="45" y="120" width="30" height="30" rx="8" class="block1" filter="url(#shadow)"/>
  <rect x="75" y="120" width="30" height="30" rx="8" class="block2" filter="url(#shadow)"/>
  <rect x="105" y="120" width="30" height="30" rx="8" class="block3" filter="url(#shadow)"/>

  <!-- Dragon tail with fun details -->
  <rect x="30" y="150" width="30" height="30" rx="8" class="block4" filter="url(#shadow)"/>
  <rect x="60" y="150" width="30" height="30" rx="8" class="block5" filter="url(#shadow)"/>
  <circle cx="45" cy="165" r="3" class="sparkle2"/>
  <circle cx="75" cy="165" r="3" class="sparkle3"/>

  <!-- Big happy smile with tongue -->
  <path d="M100 55 Q 115 70 130 55" stroke="#333" stroke-width="2" fill="none" class="toothless-features"/>
  <path d="M110 60 Q 115 65 120 60" fill="none" stroke="#FF6B6B" stroke-width="3" class="tongue"/>

  <!-- Fun freckles -->
  <circle cx="95" cy="45" r="1" class="toothless-features"/>
  <circle cx="100" cy="47" r="1" class="toothless-features"/>
  <circle cx="110" cy="47" r="1" class="toothless-features"/>
  <circle cx="115" cy="45" r="1" class="toothless-features"/>

</svg>
