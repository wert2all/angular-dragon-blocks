<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Syllable Master - Secret Model Challenge</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet" />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'surface-container': '#fff9e6',
              surface: '#fffdf5',
              'on-background': '#1e1b00',
              'inverse-on-surface': '#fffbe1',
              'surface-container-low': '#fffceb',
              'on-tertiary-container': '#00201e',
              'surface-container-high': '#fff7d1',
              'on-tertiary-fixed': '#00201e',
              'inverse-surface': '#343100',
              background: '#fffdf5',
              'outline-variant': '#cdc6a5',
              'on-tertiary': '#ffffff',
              'secondary-fixed-dim': '#d2c78e',
              'secondary-fixed': '#efe3a8',
              'tertiary-container': '#adece8',
              'primary-fixed-dim': '#e4c600',
              'on-tertiary-fixed-variant': '#00504c',
              'on-secondary': '#363100',
              'on-secondary-fixed': '#201c00',
              'on-secondary-container': '#201c00',
              outline: '#7b7759',
              primary: '#FFCF00',
              'on-error': '#ffffff',
              'on-primary': '#342a00',
              'error-container': '#ffdad6',
              'surface-tint': '#FFCF00',
              'surface-container-highest': '#fff4bd',
              'surface-dim': '#e1d9b0',
              'tertiary-fixed-dim': '#91d0cc',
              'on-primary-fixed': '#241e00',
              'on-primary-container': '#524400',
              'on-surface': '#1e1b00',
              'surface-container-lowest': '#ffffff',
              'on-secondary-fixed-variant': '#4e4713',
              secondary: '#67602b',
              'on-primary-fixed-variant': '#524400',
              tertiary: '#006a65',
              'surface-variant': '#ede3b8',
              'on-surface-variant': '#4c472a',
              'secondary-container': '#efe3a8',
              'tertiary-fixed': '#adece8',
              'surface-bright': '#fffdf5',
              'inverse-primary': '#e4c600',
              error: '#ba1a1a',
              'primary-fixed': '#ffe245',
              'primary-container': '#ffe245',
              'on-error-container': '#93000a',
            },
            borderRadius: {
              DEFAULT: '9999px',
              lg: '9999px',
              xl: '9999px',
              full: '9999px',
            },
            fontFamily: {
              headline: ['Plus Jakarta Sans'],
              body: ['Be Vietnam Pro'],
              label: ['Plus Jakarta Sans'],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
      }
      .syllable-block {
        box-shadow:
          0 8px 0 0 rgba(0, 0, 0, 0.15),
          inset 0 -4px 0 0 rgba(0, 0, 0, 0.1),
          inset 0 4px 0 0 rgba(255, 255, 255, 0.4);
        position: relative;
        transition: all 0.1s ease-out;
      }
      .syllable-block:active {
        transform: translateY(6px);
        box-shadow:
          0 2px 0 0 rgba(0, 0, 0, 0.15),
          inset 0 -2px 0 0 rgba(0, 0, 0, 0.1),
          inset 0 2px 0 0 rgba(255, 255, 255, 0.4);
      }
      .dragon-gradient {
        background: linear-gradient(135deg, #ffcf00 0%, #ffe245 100%);
      }
      .gloss-effect {
        position: relative;
        overflow: hidden;
      }
      .gloss-effect::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50%;
        background: linear-gradient(to bottom, rgba(255, 255, 255, 0.4) 0%, transparent 100%);
        pointer-events: none;
      }
      .interlock-peg {
        position: absolute;
        width: 20px;
        height: 8px;
        background: inherit;
        top: -6px;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 4px 4px 0 0;
        box-shadow: inset 0 2px 0 0 rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body
    class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container flex min-h-screen flex-col overflow-x-hidden">
    <!-- TopAppBar -->
    <header class="top-0 z-50 mx-auto flex w-full max-w-7xl items-center justify-between px-6 pt-4">
      <div class="flex items-center gap-4">
        <h1 class="text-on-primary-container font-['Plus_Jakarta_Sans'] text-2xl font-black tracking-tight">
          Syllable Master
        </h1>
      </div>
      <div class="flex items-center gap-4">
        <button
          class="text-on-surface-variant scale-95 transition-all transition-transform hover:scale-105 active:translate-y-1">
          <span class="material-symbols-outlined">volume_up</span>
        </button>
        <button
          class="text-on-surface-variant scale-95 transition-all transition-transform hover:scale-105 active:translate-y-1">
          <span class="material-symbols-outlined">lightbulb</span>
        </button>
      </div>
    </header>
    <!-- SideNavBar (HUD) -->
    <aside
      class="bg-surface-container-highest fixed top-1/2 left-0 z-40 my-auto flex hidden h-[921px] w-20 -translate-y-1/2 flex-col items-center rounded-r-full py-8 shadow-[32px_0_32px_rgba(0,0,0,0.06)] md:flex">
      <div class="mb-8 px-2 text-center">
        <div class="bg-primary mb-2 h-12 w-12 overflow-hidden rounded-full ring-2 ring-white">
          <img
            alt="Expressive Dragon Companion"
            data-alt="A small, sleek dark purple dragon with glowing blue eyes and a friendly inquisitive expression on its face"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcxBmLHrui9HaXBQs5ux32lBhovb6Lg1ks4HHRxkvga3XaysOiebqybogUv8bKZTEze_VF2ERcL8JjxI2z29qOPp-R3e_Pg3liH9JHKmQsljcFmOVLvbKIetNDNH8V53a2N_RpNDCzOHexGOtjluox-1lF0vHeyqqwpjgasgg_CDOeiID2zNFlLkBFxuxaPhk1DpFPsmAO-IRHRyTKHCovvnBgjztWyNCDqRDXftaKyonre-_IKy-qYh5E7yYq4DESa0FpsF24O5XZ" />
        </div>
        <div class="text-on-surface-variant text-[10px] font-bold tracking-tighter uppercase">Level 2</div>
      </div>
      <nav class="flex w-full flex-col gap-4">
        <button
          class="text-on-primary bg-primary m-2 scale-98 rounded-full p-3 shadow-sm transition-all hover:brightness-110 active:scale-95">
          <span class="material-symbols-outlined">map</span>
        </button>
        <button
          class="text-on-surface-variant hover:bg-surface-container m-2 scale-98 rounded-full p-3 transition-all active:scale-95">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <button
          class="text-on-surface-variant hover:bg-surface-container m-2 scale-98 rounded-full p-3 transition-all active:scale-95">
          <span class="material-symbols-outlined">emoji_objects</span>
        </button>
        <button
          class="text-on-surface-variant hover:bg-surface-container m-2 scale-98 rounded-full p-3 transition-all active:scale-95">
          <span class="material-symbols-outlined">volume_up</span>
        </button>
      </nav>
    </aside>
    <main class="container mx-auto max-w-5xl flex-grow px-6 pt-8 pb-32">
      <!-- Main Game Area -->
      <div class="grid grid-cols-1 items-start gap-8 md:grid-cols-12">
        <!-- Left Side: Dragon & Instruction -->
        <div class="flex flex-col gap-6 md:col-span-4">
          <div class="dragon-gradient gloss-effect relative rounded-full border-t border-white/40 p-8 shadow-xl">
            <div class="flex items-start gap-4">
              <div
                class="border-primary/30 flex h-16 w-16 shrink-0 items-center justify-center rounded-full border-2 bg-white">
                <img
                  alt="Dragon Avatar"
                  class="h-12 w-12"
                  data-alt="close up of a friendly cartoon dragon with shimmering scales and wide curious eyes looking at the viewer"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuARGvFM0vmb85Orpn7Qm7s10iX7-U-9NJyj6TCBqZ3kxNNR9pCSrZKWOWH0vs8ekSJ-bTfagX2V0DyoiejlE9Oirka_awBk_a7o2iPEDBxuZHPqfAXfwIwzKp9WyaTKaxrhD2GUf_LdPAM_mIQiIvYOMKfUhQB5_M_QIn-ATTd5RZslT4XKR-ca_sgjzHv879nCDXHJx5PWuRGDLgaEWe5oXL1dVZGIvGFhnqtuAdz1X-i76gX3fJvxM8SceU_Rb8Ueufo4xEj0LKK3" />
              </div>
              <div class="flex flex-col gap-2">
                <span class="text-on-primary text-[10px] font-bold tracking-widest uppercase">Master Dragon says:</span>
                <p class="text-on-primary font-body text-lg leading-tight font-bold">
                  "Ooh! A secret model! Can you find the syllables to wake up this machine?"
                </p>
              </div>
            </div>
          </div>
          <!-- Score/Progress Mini-Widget -->
          <div
            class="bg-surface-container-high border-primary/10 flex items-center justify-between rounded-full border p-6">
            <div class="flex flex-col">
              <span class="text-on-surface-variant text-[10px] font-bold tracking-widest uppercase">
                Syllables Found
              </span>
              <span class="font-headline text-primary text-2xl font-black">0 / 2</span>
            </div>
            <div class="flex gap-2">
              <div class="bg-surface-container-highest border-outline-variant h-4 w-4 rounded-full border-2"></div>
              <div class="bg-surface-container-highest border-outline-variant h-4 w-4 rounded-full border-2"></div>
            </div>
          </div>
        </div>
        <!-- Center/Right: Secret Model Frame -->
        <div class="md:col-span-8">
          <div
            class="bg-surface-container-lowest border-primary/20 group relative overflow-hidden rounded-[4rem] border-4 border-dashed p-8 shadow-sm">
            <!-- Frame Label -->
            <div
              class="bg-inverse-surface text-inverse-on-surface font-headline absolute top-4 left-1/2 z-10 -translate-x-1/2 rounded-full px-8 py-2 text-xs font-black tracking-widest uppercase">
              SECRET MODEL: ???
            </div>
            <!-- Secret Model Visualization -->
            <div
              class="bg-surface-container-low relative mx-auto flex aspect-square w-full max-w-md items-center justify-center overflow-hidden rounded-[3rem] shadow-inner">
              <img
                alt="Secret Robot Model"
                class="h-64 w-64 opacity-90 drop-shadow-2xl"
                data-alt="A friendly retro-style robot made of geometric primary colored blocks standing in a clean digital laboratory environment with soft glowing lights"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBK81m1Zbkk-VtblifTFI1uVex_a3z7G5syVzadOKsRP2Vl1uYlfZRdO6XIepzdRqjgz2xQy-dLRDkkgyJwEDaywmsAyQfuKgmgrVeUojmhf4ngtCu1Pbb0vBRZxbpeNrQYoOSq-68aav8-4ecR7LPAwkU1tr6M9ZHW87FAyMO7jsbnCON5gwhkjXorwoT29aMTG4lkRpHdQ8BdSr1H-CZ7sIQ1u904ijo_sF2Y2A0pYGRuPFUgbOSJUyPq7lUAit-ZHZu7cOx3rLfd" />
              <!-- Interlocking Slots -->
              <div class="absolute bottom-8 flex gap-6">
                <div
                  class="bg-surface-container-highest border-primary/30 flex h-16 w-24 items-center justify-center rounded-full border-2 border-dashed shadow-inner">
                  <span class="text-primary material-symbols-outlined text-3xl font-black">add</span>
                </div>
                <div
                  class="bg-surface-container-highest border-primary/30 flex h-16 w-24 items-center justify-center rounded-full border-2 border-dashed shadow-inner">
                  <span class="text-primary material-symbols-outlined text-3xl font-black">add</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Syllable Bin (Asymmetric Layout) -->
      <div class="mt-12">
        <h3 class="text-on-surface-variant mb-8 flex items-center gap-4 text-xs font-black tracking-[0.3em] uppercase">
          <span class="bg-primary h-1 w-12 rounded-full"></span>
          Select Syllable Blocks
        </h3>
        <div class="flex flex-wrap justify-center gap-6">
          <!-- Correct: RO -->
          <button
            class="syllable-block bg-primary text-on-primary group gloss-effect flex items-center justify-center rounded-[2rem] px-10 py-8 transition-all">
            <div class="interlock-peg"></div>
            <span class="font-headline text-5xl font-black tracking-tight drop-shadow-sm">RO</span>
          </button>
          <!-- Distractor: CAT -->
          <button
            class="syllable-block text-on-secondary-container group gloss-effect flex items-center justify-center rounded-[2rem] bg-[#EFE3A8] px-10 py-8 transition-all">
            <div class="interlock-peg"></div>
            <span class="font-headline text-5xl font-black tracking-tight drop-shadow-sm">CAT</span>
          </button>
          <!-- Correct: BOT -->
          <button
            class="syllable-block bg-primary text-on-primary group gloss-effect flex items-center justify-center rounded-[2rem] px-10 py-8 transition-all">
            <div class="interlock-peg"></div>
            <span class="font-headline text-5xl font-black tracking-tight drop-shadow-sm">BOT</span>
          </button>
          <!-- Distractor: NO -->
          <button
            class="syllable-block text-on-secondary-container group gloss-effect flex items-center justify-center rounded-[2rem] bg-[#EFE3A8] px-10 py-8 transition-all">
            <div class="interlock-peg"></div>
            <span class="font-headline text-5xl font-black tracking-tight drop-shadow-sm">NO</span>
          </button>
          <!-- Distractor: PO -->
          <button
            class="syllable-block text-on-secondary-container group gloss-effect flex items-center justify-center rounded-[2rem] bg-[#EFE3A8] px-10 py-8 transition-all">
            <div class="interlock-peg"></div>
            <span class="font-headline text-5xl font-black tracking-tight drop-shadow-sm">PO</span>
          </button>
        </div>
      </div>
    </main>
    <!-- BottomNavBar (Mobile Shell) -->
    <nav
      class="bg-surface-container-highest border-primary/10 fixed bottom-0 left-0 z-50 flex h-24 w-full items-end justify-around border-t px-8 pb-4 shadow-[0_-8px_24px_rgba(0,0,0,0.05)] md:hidden">
      <button
        class="bg-primary text-on-primary border-surface flex h-16 w-16 -translate-y-4 flex-col items-center justify-center rounded-full border-4 shadow-lg transition-transform duration-150 ease-out active:scale-90">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">architecture</span>
        <span class="font-label mt-1 text-[10px] font-bold tracking-widest uppercase">Build</span>
      </button>
      <button
        class="text-on-surface-variant hover:text-primary flex flex-col items-center justify-center pb-2 transition-transform duration-150 ease-out active:scale-90">
        <span class="material-symbols-outlined">grid_view</span>
        <span class="font-label mt-1 text-[10px] font-bold tracking-widest uppercase">Inventory</span>
      </button>
      <button
        class="text-on-surface-variant hover:text-primary flex flex-col items-center justify-center pb-2 transition-transform duration-150 ease-out active:scale-90">
        <span class="material-symbols-outlined">settings</span>
        <span class="font-label mt-1 text-[10px] font-bold tracking-widest uppercase">Settings</span>
      </button>
    </nav>
    <!-- Floating Action Button -->
  </body>
</html>
