<div
  class="relative h-25 w-30 rounded border-2 border-dashed border-(--brick-border-color) bg-transparent"
  [style]="containerStyle()"
  aria-hidden="true">
  <!-- First stud row -->
  <div class="absolute -top-3.5 right-0 left-0 flex justify-center gap-4">
    <div class="h-3.5 w-6 rounded-t-md border-2 border-dashed border-(--brick-border-color) bg-transparent"></div>
    <div class="h-3.5 w-6 rounded-t-md border-2 border-dashed border-(--brick-border-color) bg-transparent"></div>
  </div>
  <!-- Second stud row -->
  <div class="absolute -top-0.5 right-0 left-0 flex justify-center gap-4">
    <div class="h-3.5 w-6 rounded-t-md border-2 border-dashed border-(--brick-border-color) bg-transparent"></div>
    <div class="h-3.5 w-6 rounded-t-md border-2 border-dashed border-(--brick-border-color) bg-transparent"></div>
  </div>
  <!-- Brick face area -->
  <div
    class="absolute right-2.5 bottom-2.5 left-2.5 h-14 rounded border-2 border-dashed border-(--brick-border-color) bg-transparent"></div>
</div>
