<header class="mt-6 ml-16 flex items-center justify-between gap-4 px-6">
  <a
    class="flex cursor-pointer items-center gap-2 rounded-xl bg-warm-cream/95 px-3 py-2 shadow-lg shadow-deep-purple/10 backdrop-blur-sm transition-transform duration-300 hover:scale-105 sm:gap-4 sm:rounded-2xl sm:px-6 sm:py-3"
    href="/">
    <img
      ngSrc="/dragon-blocks-logo.svg"
      alt="Dragon Blocks"
      width="180"
      height="48"
      priority
      class="h-72 w-auto object-contain sm:h-36" />
    <div class="hidden h-12 w-px bg-vibrant-orange/40 sm:block sm:h-16"></div>
    <span
      class="hidden font-fancy text-xl font-bold tracking-tight text-deep-purple sm:block sm:text-2xl md:text-3xl lg:text-4xl">
      <b class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl">Dragon Blocks:</b>
      <span class="mr-8 ml-4 hidden md:inline">Reading Adventures</span>
    </span>
  </a>
  <nav class="flex items-center gap-4">
    <a
      routerLink="/quest/1"
      class="rounded-lg bg-soft-teal/30 px-4 py-2 text-deep-purple transition-colors hover:bg-soft-teal/50">
      Quests
    </a>
    <app-volume-toggler [isVolumeOn]="isVolumeOn()" (toggle)="toggleVolume()"></app-volume-toggler>
  </nav>
</header>
