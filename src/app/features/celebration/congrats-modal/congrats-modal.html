@if (isOpen()) {
  <app-salute-animation (animationComplete)="onAnimationComplete()" />
  <app-modal-window (closeWindow)="onClose()">
    <div
      class="flex flex-col items-center justify-center rounded-2xl border-4 border-deep-purple bg-warm-cream p-8 text-center shadow-2xl"
      role="dialog"
      aria-modal="true"
      aria-labelledby="congrats-title">
      <h2 id="congrats-title" class="mb-4 text-3xl font-bold text-deep-purple">Congratulations!</h2>
      <p class="mb-2 text-xl text-deep-purple">You did it!</p>
      <p class="mb-6 text-lg text-deep-purple">Great job building with syllables!</p>
      <button
        (click)="onClose()"
        type="button"
        class="rounded-full bg-vibrant-orange px-8 py-3 text-lg font-semibold text-white shadow-lg transition-transform hover:scale-105 hover:bg-orange-600 focus:ring-2 focus:ring-deep-purple focus:ring-offset-2 focus:outline-none"
        aria-label="Continue to next quest">
        Continue
      </button>
    </div>
  </app-modal-window>
}
