<div class="flex flex-wrap justify-center">
  @for (syllable of syllables(); track syllable.syllable) {
    @if (syllable.isDone) {
      <app-lego-brick [value]="syllable.syllable" [colorClass]="syllable.color" />
    } @else {
      <app-border-lego-brick colorClass="border-vibrant-orange" />
    }
  }
</div>
