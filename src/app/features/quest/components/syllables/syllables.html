<div class="flex flex-wrap justify-center">
  @for (syllable of syllables(); track syllable.syllable) {
    @if (syllable.isDone) {
      <app-lego-brick [value]="syllable.syllable" colorClass="lego-vibrant-orange" />
    } @else {
      <div
        class="flex h-48 w-48 items-center justify-center rounded-lg border-2 border-dashed border-deep-purple bg-warm-cream shadow-md"></div>
    }
  }
</div>
