<div
  class="flex flex-col items-center gap-6 rounded-3xl border-4 border-soft-teal bg-warm-cream p-6 shadow-2xl"
  [class.max-w-2xl]="isSmall()">
  <img
    [src]="quest()!.image"
    [alt]="quest()!.word"
    class="w-auto rounded-2xl border-3 border-soft-teal object-contain"
    [class.max-h-96]="isSmall()" />

  @if (noClick() === false) {
    <button
      (click)="onWordClick()"
      class="w-full rounded-xl bg-deep-purple py-3 text-xl font-bold tracking-widest text-white uppercase transition-all duration-200 hover:scale-[1.02] hover:shadow-lg"
      [class.bg-deep-purple]="!quest()!.isDone"
      [class.bg-soft-teal]="quest()!.isDone"
      [class.text-white]="!quest()!.isDone"
      [class.text-deep-purple]="quest()!.isDone">
      {{ quest()!.word }}
    </button>
  } @else {
    <div
      class="w-full rounded-xl bg-deep-purple py-3 text-center text-xl font-bold tracking-widest text-white uppercase transition-all duration-200 hover:scale-[1.02] hover:shadow-lg"
      [class.bg-deep-purple]="!quest()!.isDone"
      [class.bg-soft-teal]="quest()!.isDone"
      [class.text-white]="!quest()!.isDone"
      [class.text-deep-purple]="quest()!.isDone">
      {{ quest()!.word }}
    </div>
  }
</div>
